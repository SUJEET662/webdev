<!DOCTYPE html>
<html>
<head>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Arial;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .left {
            width: 50%;
            background: #ededf4;
            padding: 80px;
            display: flex;
            align-items: center;
        }

        form {
            width: 100%;
            max-width: 400px;
        }

        .right {
            width: 50%;
        }

        .right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #427a31;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
        }

        .social {
            display: flex;
            gap: 10px;
        }

        .social button {
            background: white;
            border: 1px solid #ccc;
            color: black;
        }

        p {
            text-align: center;
        }
    </style>
    <script src="signup.js"></script>
</head>

<body>
    <div class="container">

        <div class="left">
            <form>

                <label>Name</label>
                <input type="text" placeholder="Enter your name">

                <label>Email address</label>
                <input type="email" placeholder="Enter your email">

                <label>Password</label>
                <input type="password" placeholder="Enter password">

                <button>Signup</button>

                <p>Or</p>

                <div class="social">
                    <button>Google</button>
                    <button>Apple</button>
                </div>

                <p>Have an account? <a href="login.html">Sign In</a></p>

            </form>
        </div>

        <div class="right">
            <img src="image1.jpg">
        </div>

    </div>

</body>

</html>
